name: kouwen
description: AI Skills Platform for Mobile
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  markdown: ^7.2.0
